services:
  - type: web
    name: chat-axe
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_PROVIDER
        value: huggingface
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: EMBEDDING_DIM
        value: "384"
      - key: HF_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.12"
